# Cloud Build trigger for the ebayscout Cloud Run service image.
# This is separate from the buybot service trigger so they don't interfere.
#
# Trigger is configured to watch: main branch, ebayscout/** file filter
# Console: Cloud Build → Triggers → ebayscout-job → Edit → Branch: ^main$

steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -f
      - ebayscout/Dockerfile
      - -t
      - us-east1-docker.pkg.dev/$PROJECT_ID/buttons/ebayscout:$COMMIT_SHA
      - -t
      - us-east1-docker.pkg.dev/$PROJECT_ID/buttons/ebayscout:latest
      - .   # build context is repo root

  # Push both tags
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - --all-tags
      - us-east1-docker.pkg.dev/$PROJECT_ID/buttons/ebayscout

  # Deploy to Cloud Run Service
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ebay-scout
      - --image=us-east1-docker.pkg.dev/$PROJECT_ID/buttons/ebayscout:$COMMIT_SHA
      - --region=us-east1
      - --memory=4Gi
      - --cpu=2
      - --timeout=1800
      - --max-instances=1   # keep at 1 — manual pending_scans state is per-container
      # OMP_NUM_THREADS pins PyTorch CPU threads to --cpu. SERVICE_URL lets the
      # /crawl500 slash handler invoke /internal/crawl500 through the load balancer
      # so the heavy run gets a fresh CPU-funded request (Cloud Run throttles CPU
      # between requests). Must be this service's own public URL.
      - --update-env-vars=OMP_NUM_THREADS=2,SERVICE_URL=https://ebay-scout-404960106109.us-east1.run.app
      # Scale-to-zero, cheapest. Do NOT add --no-cpu-throttling or
      # --min-instances=1 — both are off budget (see CLAUDE.md). Keep CPU for
      # heavy work by running it inside an in-flight HTTP request, not via flags.

images:
  - us-east1-docker.pkg.dev/$PROJECT_ID/buttons/ebayscout

options:
  logging: CLOUD_LOGGING_ONLY
